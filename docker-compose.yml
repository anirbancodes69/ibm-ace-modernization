services:

  postgres:
    image: postgres:17-alpine
    container_name: modernization-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d modernization"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - modernization-network

  kafka:
    image: apache/kafka:4.0.0
    container_name: modernization-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"

    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,DOCKER://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,DOCKER://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,DOCKER:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      CLUSTER_ID: ${KAFKA_CLUSTER_ID}

      # Required for single-node Kafka
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    volumes:
      - kafka-data:/var/lib/kafka/data

    networks:
      - modernization-network

  producer-service:
    build:
      context: ./producer-service
      dockerfile: Dockerfile
    container_name: modernization-producer
    restart: unless-stopped
    env_file:
      - ./producer-service/.env.docker
    depends_on:
      kafka:
        condition: service_started
    ports:
      - "3000:3000"
    networks:
      - modernization-network

  consumer-service:
    build:
      context: ./consumer-service
    container_name: modernization-consumer
    restart: unless-stopped
    env_file:
      - ./consumer-service/.env.docker
    ports:
      - "3001:3001"
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - modernization-network

  kong:
    image: kong:3.8
    container_name: modernization-kong

    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_LOG_LEVEL: info

    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml

    ports:
      - "8000:8000"
      - "8001:8001"

    depends_on:
      - producer-service

    networks:
      - modernization-network

volumes:
  postgres-data:
  kafka-data:

networks:
  modernization-network:
    driver: bridge